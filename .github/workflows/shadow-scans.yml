name: Shadow scans
on:
  schedule:
    # Run the workflow every day at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: github-ubuntu-latest-s
    name: Build
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: 2026.5.2
      - uses: SonarSource/ci-github-actions/build-maven@9456e3aab93a6c6d0c459b977aaa594bda102e29 # 1.4.0
        with:
          run-shadow-scans: true
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer

      - name: Run IRIS Analysis
        uses: SonarSource/unified-dogfooding-actions/run-iris@54cee68ff08f10645c757675c59d232063e0b947 # 1.0.0
        with:
          primary_project_key: "SonarSource_sonarqube-ide-visualstudio-roslyn"
          primary_platform: "Next"
          shadow1_project_key: "SonarSource_sonarqube-ide-visualstudio-roslyn"
          shadow1_platform: "SQC-EU"
          shadow2_project_key: "SonarSource_sonarqube-ide-visualstudio-roslyn"
          shadow2_platform: "SQC-US"
